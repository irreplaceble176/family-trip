function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

let _spendTip = null;
document.addEventListener('touchstart', ()=>{ hideSpendTooltip(); }, {passive:true});
document.addEventListener('click', ()=>{ hideSpendTooltip(); });
function showSpendTooltip(el, date, amt){
  hideSpendTooltip();
  const tip = document.createElement('div');
  tip.className = 'spend-tooltip';
  tip.innerHTML = `<div>${date}</div><div>${amt}</div>`;
  document.body.appendChild(tip);
  const r = el.getBoundingClientRect();
  tip.style.left = (r.left + r.width/2 - tip.offsetWidth/2) + 'px';
  tip.style.top  = (r.top + window.scrollY - tip.offsetHeight - 6) + 'px';
  _spendTip = tip;
}
function hideSpendTooltip(){
  if(_spendTip){ _spendTip.remove(); _spendTip = null; }
}

/* ---------------- Modals ---------------- */
function openModal(html){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="overlay" id="overlayEl"><div class="modal">${html}</div></div>`;
  document.getElementById('overlayEl').addEventListener('click', (e)=>{
    if(e.target.id === 'overlayEl') closeModal();
  });
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
}

function openItemModal(dayId, itemId){
  const day = state.days.find(d=>d.id===dayId);
  const item = itemId ? day.items.find(i=>i.id===itemId) : null;

  // 附件狀態：existing = 已存在 IndexedDB 的附件中繼資料；staged = 這次新選但尚未儲存的檔案
  let existingAtts = item && item.attachments ? item.attachments.slice() : [];
  let staged = []; // {id, name, type, size, file}
  let removedExistingIds = [];

  openModal(`
    <h3>${item ? '編輯行程項目' : '新增行程項目'}</h3>
    <div class="field"><label>時間</label><input type="time" id="f-time" value="${item?item.time||'':''}"></div>
    <div class="field"><label>行程名稱</label><input type="text" id="f-title" placeholder="例如：清水寺參拜" value="${item?escapeHtml(item.title||''):''}"></div>
    <div class="field"><label>地點</label><input type="text" id="f-location" placeholder="例如：清水寺、東京鐵塔" value="${item?escapeHtml(item.location||''):''}"></div>
    <div class="field"><label>備註</label><textarea id="f-note" rows="2" placeholder="門票、注意事項等">${item?escapeHtml(item.note||''):''}</textarea></div>
    <div class="field">
      <label>附件（照片、截圖、Email、PDF 等）</label>
      <div class="attach-hint">檔案上傳至雲端，所有裝置皆可查看（需網路）</div>
      <div class="attach-list" id="attachList"></div>
      <button type="button" class="attach-add-btn" id="attachAddBtn">＋</button>
      <input type="file" id="f-attach" multiple style="display:none">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">取消</button>
      <button class="btn-primary" id="saveBtn">儲存</button>
    </div>
  `);

  const listEl = document.getElementById('attachList');

  async function renderAttachList(){
    listEl.innerHTML = '';
    // 已存在的附件（用 Firebase Storage downloadURL 顯示縮圖）
    for(const att of existingAtts){
      const card = document.createElement('div');
      card.className = 'attach-card';
      const thumbContent = (att.type && att.type.startsWith('image/') && att.url)
        ? `<img src="${att.url}" alt="">`
        : fileIcon(att.type, att.name);
      card.innerHTML = `
        <div class="attach-thumb" data-view-existing="${att.id}">${thumbContent}</div>
        <div class="attach-name">${escapeHtml(att.name||'')}</div>
        <div class="attach-remove" data-remove-existing="${att.id}">✕</div>
      `;
      listEl.appendChild(card);
    }
    // 這次新加入、尚未儲存的檔案
    staged.forEach(s=>{
      const card = document.createElement('div');
      card.className = 'attach-card';
      card.innerHTML = `
        <div class="attach-thumb" data-view-staged="${s.id}">${fileIcon(s.type, s.name)}</div>
        <div class="attach-name">${escapeHtml(s.name)}</div>
        <div class="attach-remove" data-remove-staged="${s.id}">✕</div>
      `;
      listEl.appendChild(card);
      if(s.type && s.type.startsWith('image/')){
        const url = URL.createObjectURL(s.file);
        card.querySelector('.attach-thumb').innerHTML = `<img src="${url}" alt="">`;
      }
    });
  }
  renderAttachList();

  document.getElementById('attachAddBtn').addEventListener('click', ()=>{
    document.getElementById('f-attach').click();
  });
  document.getElementById('f-attach').addEventListener('change', (e)=>{
    const files = Array.from(e.target.files || []);
    files.forEach(file=>{
      staged.push({id: uid(), name: file.name, type: file.type, size: file.size, file});
    });
    e.target.value = '';
    renderAttachList();
  });

  listEl.addEventListener('click', (e)=>{
    const rmExisting = e.target.closest('[data-remove-existing]');
    if(rmExisting){
      const id = rmExisting.dataset.removeExisting;
      removedExistingIds.push(id);
      existingAtts = existingAtts.filter(a=>a.id!==id);
      renderAttachList();
      return;
    }
    const rmStaged = e.target.closest('[data-remove-staged]');
    if(rmStaged){
      staged = staged.filter(s=>s.id!==rmStaged.dataset.removeStaged);
      renderAttachList();
      return;
    }
    const viewExisting = e.target.closest('[data-view-existing]');
    if(viewExisting){
      const att = existingAtts.find(a=>a.id===viewExisting.dataset.viewExisting);
      if(att && att.url) openAttachmentViewer(att.url, att.name, att.type);
      return;
    }
    const viewStaged = e.target.closest('[data-view-staged]');
    if(viewStaged){
      const s = staged.find(x=>x.id===viewStaged.dataset.viewStaged);
      if(s) openAttachmentViewer(null, s.name, s.type, s);
      return;
    }
  });

  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('saveBtn').onclick = async ()=>{
    const time = document.getElementById('f-time').value;
    const title = document.getElementById('f-title').value.trim();
    const location = document.getElementById('f-location').value.trim();
    const note = document.getElementById('f-note').value.trim();
    if(!title){ alert('請輸入行程名稱'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '儲存中…';

    try{
      // 上傳新附件到 Firebase Storage，取得 downloadURL
      const uploadedAtts = [];
      for(const s of staged){
        saveBtn.textContent = `上傳 ${s.name}…`;
        try{
          const url = await attPut(s.id, s.name, s.type, s.file);
          uploadedAtts.push({id:s.id, name:s.name, type:s.type, size:s.size, url});
        }catch(uploadErr){
          console.error('附件上傳失敗:', uploadErr);
          const msg = uploadErr.code === 'storage/unauthorized'
            ? '上傳失敗：Firebase Storage 未開放權限，請至 Firebase Console 設定 Storage 規則。'
            : `上傳失敗：${uploadErr.message}`;
          alert(msg);
          saveBtn.disabled = false;
          saveBtn.textContent = '儲存';
          return;
        }
      }
      // 刪除被移除的附件
      for(const id of removedExistingIds){
        await attDelete(id);
      }
      const finalAttachments = existingAtts.concat(uploadedAtts);

      if(item){
        item.time = time; item.title = title; item.location = location; item.note = note;
        item.attachments = finalAttachments;
      } else {
        day.items.push({id: uid(), time, title, location, note, attachments: finalAttachments});
      }
      saveState();
      closeModal();
      render();
    }catch(err){
      console.error(err);
      alert('附件儲存失敗，請再試一次');
      saveBtn.disabled = false;
      saveBtn.textContent = '儲存';
    }
  };
}

function openAttachmentViewer(url, name, type, stagedFile){
  // 若傳入的是 staged file（還沒上傳的），用 createObjectURL
  let viewUrl = url;
  let blobUrl = null;
  if(stagedFile){
    viewUrl = URL.createObjectURL(stagedFile.file);
    blobUrl = viewUrl;
    name = stagedFile.name;
    type = stagedFile.type;
  }

  let bodyHtml;
  if(type && type.startsWith('image/')){
    bodyHtml = `<img src="${viewUrl}" style="width:100%; border-radius:10px; display:block;">`;
  } else if(type === 'application/pdf' || /\.pdf$/i.test(name||'')){
    bodyHtml = `<iframe src="${viewUrl}" style="width:100%; height:60vh; border:1px solid var(--line); border-radius:10px;"></iframe>`;
  } else {
    bodyHtml = `<div class="empty-state">此檔案類型無法直接預覽，請下載後開啟</div>`;
  }

  openModal(`
    <h3>${escapeHtml(name||'附件')}</h3>
    ${bodyHtml}
    <div class="modal-actions">
      <button class="btn-secondary" id="closeViewerBtn">關閉</button>
      <a class="btn-primary" style="text-align:center; text-decoration:none;" href="${viewUrl}" target="_blank" download="${escapeHtml(name||'file')}">下載檔案</a>
    </div>
  `);
  document.getElementById('closeViewerBtn').onclick = ()=>{
    if(blobUrl) URL.revokeObjectURL(blobUrl);
    closeModal();
  };
}

function openExpenseModal(expenseId){
  const exp = expenseId ? state.expenses.find(e=>e.id===expenseId) : null;
  if(state.members.length===0){
    alert('請先在成員區加入至少一位成員');
    return;
  }
  const paidBy     = exp ? exp.paidBy : state.members[0].id;
  const splitAmong = exp ? exp.splitAmong.slice() : state.members.map(m=>m.id);
  const currency   = exp ? (exp.currency || 'TWD') : 'TWD';
  const today      = localDateStr(new Date());

  /* 附件狀態 */
  let existingAtts     = exp && exp.attachments ? exp.attachments.slice() : [];
  let staged           = [];
  let removedExistingIds = [];

  openModal(`
    <h3>${exp ? '編輯花費' : '新增花費'}</h3>
    <div class="field"><label>項目名稱</label><input type="text" id="f-desc" placeholder="例如：晚餐、車票" value="${exp?escapeHtml(exp.desc||''):''}"></div>
    <div class="field">
      <label>幣別</label>
      <select id="f-currency">
        ${Object.keys(CURRENCIES).map(c=>`<option value="${c}" ${c===currency?'selected':''}>${CURRENCIES[c].label}（${c} ${CURRENCIES[c].symbol}）</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>金額</label><input type="number" id="f-amount" placeholder="0" min="0" step="1" value="${exp?exp.amount:''}"></div>
    <div class="field"><label>日期</label><input type="date" id="f-date" value="${exp?exp.date||today:today}"></div>
    <div class="field">
      <label>誰先付的錢</label>
      <select id="f-paidby">
        ${state.members.map(m=>`<option value="${m.id}" ${m.id===paidBy?'selected':''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>由誰均分這筆花費</label>
      <div class="split-grid" id="splitGrid">
        ${state.members.map(m=>`<div class="split-opt ${splitAmong.includes(m.id)?'on':''}" data-mid="${m.id}">${escapeHtml(m.name)}</div>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>附件（收據、截圖等）</label>
      <div class="attach-hint">檔案上傳至雲端，所有裝置皆可查看（需網路）</div>
      <div class="attach-list" id="expAttachList"></div>
      <button type="button" class="attach-add-btn" id="expAttachAddBtn">＋</button>
      <input type="file" id="f-exp-attach" multiple accept="image/*,application/pdf" style="display:none">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">取消</button>
      <button class="btn-primary" id="saveBtn">儲存</button>
    </div>
  `);

  /* ── 附件渲染（複用行程 modal 邏輯）── */
  const listEl = document.getElementById('expAttachList');

  async function renderExpAttachList(){
    listEl.innerHTML = '';
    for(const att of existingAtts){
      const card = document.createElement('div');
      card.className = 'attach-card';
      const thumbContent = (att.type && att.type.startsWith('image/') && att.url)
        ? `<img src="${att.url}" alt="">`
        : fileIcon(att.type, att.name);
      card.innerHTML = `
        <div class="attach-thumb" data-view-existing="${att.id}">${thumbContent}</div>
        <div class="attach-name">${escapeHtml(att.name||'')}</div>
        <div class="attach-remove" data-remove-existing="${att.id}">✕</div>
      `;
      listEl.appendChild(card);
    }
    staged.forEach(s=>{
      const card = document.createElement('div');
      card.className = 'attach-card';
      card.innerHTML = `
        <div class="attach-thumb" data-view-staged="${s.id}">${fileIcon(s.type, s.name)}</div>
        <div class="attach-name">${escapeHtml(s.name)}</div>
        <div class="attach-remove" data-remove-staged="${s.id}">✕</div>
      `;
      listEl.appendChild(card);
      if(s.type && s.type.startsWith('image/')){
        const url = URL.createObjectURL(s.file);
        card.querySelector('.attach-thumb').innerHTML = `<img src="${url}" alt="">`;
      }
    });
  }
  renderExpAttachList();

  document.getElementById('expAttachAddBtn').addEventListener('click', ()=>{
    document.getElementById('f-exp-attach').click();
  });
  document.getElementById('f-exp-attach').addEventListener('change', (e)=>{
    Array.from(e.target.files||[]).forEach(file=>{
      staged.push({id:uid(), name:file.name, type:file.type, size:file.size, file});
    });
    e.target.value = '';
    renderExpAttachList();
  });

  listEl.addEventListener('click', (e)=>{
    const rmE = e.target.closest('[data-remove-existing]');
    if(rmE){ removedExistingIds.push(rmE.dataset.removeExisting); existingAtts=existingAtts.filter(a=>a.id!==rmE.dataset.removeExisting); renderExpAttachList(); return; }
    const rmS = e.target.closest('[data-remove-staged]');
    if(rmS){ staged=staged.filter(s=>s.id!==rmS.dataset.removeStaged); renderExpAttachList(); return; }
    const vE = e.target.closest('[data-view-existing]');
    if(vE){ const att=existingAtts.find(a=>a.id===vE.dataset.viewExisting); if(att&&att.url) openAttachmentViewer(att.url, att.name, att.type); return; }
    const vS = e.target.closest('[data-view-staged]');
    if(vS){ const s=staged.find(x=>x.id===vS.dataset.viewStaged); if(s) openAttachmentViewer(null,s.name,s.type,s); return; }
  });

  /* ── 分攤選擇 ── */
  document.querySelectorAll('#splitGrid .split-opt').forEach(el=>{
    el.addEventListener('click', ()=> el.classList.toggle('on'));
  });

  document.getElementById('cancelBtn').onclick = closeModal;

  document.getElementById('saveBtn').onclick = async ()=>{
    const desc       = document.getElementById('f-desc').value.trim();
    const currencyVal= document.getElementById('f-currency').value;
    const amount     = parseFloat(document.getElementById('f-amount').value);
    const date       = document.getElementById('f-date').value;
    const paidByVal  = document.getElementById('f-paidby').value;
    const chosen     = [...document.querySelectorAll('#splitGrid .split-opt.on')].map(el=>el.dataset.mid);
    if(!desc)            { alert('請輸入項目名稱'); return; }
    if(!amount||amount<=0){ alert('請輸入有效金額'); return; }
    if(chosen.length===0) { alert('請至少選擇一位分攤者'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.textContent = '儲存中…';

    try{
      const uploadedAtts = [];
      for(const s of staged){
        saveBtn.textContent = `上傳 ${s.name}…`;
        try{
          const url = await attPut(s.id, s.name, s.type, s.file);
          uploadedAtts.push({id:s.id, name:s.name, type:s.type, size:s.size, url});
        }catch(uploadErr){
          console.error('附件上傳失敗:', uploadErr);
          const msg = uploadErr.code === 'storage/unauthorized'
            ? '上傳失敗：Firebase Storage 未開放權限，請至 Firebase Console 設定 Storage 規則。'
            : `上傳失敗：${uploadErr.message}`;
          alert(msg);
          saveBtn.disabled = false;
          saveBtn.textContent = '儲存';
          return;
        }
      }
      for(const id of removedExistingIds) await attDelete(id);
      const finalAtts = existingAtts.concat(uploadedAtts);

      if(exp){
        exp.desc=desc; exp.currency=currencyVal; exp.amount=amount; exp.date=date;
        exp.paidBy=paidByVal; exp.splitAmong=chosen; exp.attachments=finalAtts;
      } else {
        state.expenses.push({id:uid(), desc, currency:currencyVal, amount, date, paidBy:paidByVal, splitAmong:chosen, attachments:finalAtts});
      }
      saveState(); closeModal(); render();
    }catch(err){
      console.error(err);
      alert('附件儲存失敗，請再試一次');
      saveBtn.disabled=false; saveBtn.textContent='儲存';
    }
  };
}

    <input type="number" id="r-amount" min="0" step="any" placeholder="0">

    <label>日期</label>

      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="repayConfirmBtn">確認還款</button>

  document.getElementById('repayConfirmBtn').addEventListener('click', ()=>{

    const currency = document.getElementById('r-currency').value;
    const date     = document.getElementById('r-date').value;

    if(!state.repayments) state.repayments = [];
    state.repayments.push({ id: uid(), from, to, amount, currency, date, note });
    saveState(); render(); closeModal();

}

/* ================================================================
   多人即時同步 — Firebase Firestore
   架構：每個旅程有一個「房間碼」（6碼大寫英數），
         所有加入的人共用同一份 Firestore 文件，即時同步。
   ================================================================ */

let syncRoomId    = null;   // 目前加入的房間碼
let syncUnsub     = null;   // Firestore onSnapshot 取消訂閱
let isSyncPaused  = false;  // 收到遠端更新時暫停本地寫回，避免迴圈
let fbReady       = false;

/* 等 Firebase 模組載入完成 */
window.addEventListener('firebase-ready', ()=>{ fbReady = true; });

/* 產生 6 碼大寫房間碼 */
function genRoomCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, ()=> chars[Math.floor(Math.random()*chars.length)]).join('');
}

function setSyncStatus(mode, text){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.className = 'sync-status ' + mode;
  el.textContent = text;
}

/* 把本地 state 推送到 Firestore（debounce 1s） */
let syncPushTimer = null;
function syncPush(){
  if(!syncRoomId || !fbReady) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(async ()=>{
    try{
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      await setDoc(doc(db, 'rooms', syncRoomId), {
        state: JSON.parse(JSON.stringify(state)),
        updatedAt: serverTimestamp()
      }, { merge: false });
    }catch(err){
      console.error('sync push failed', err);
    }
  }, 1000);
}

/* 訂閱 Firestore，收到遠端更新就 render */
function syncSubscribe(roomId){
  if(syncUnsub) syncUnsub();
  const { db, doc, onSnapshot } = window._fb;
  setSyncStatus('connecting', '🟡 連線中…');
  syncUnsub = onSnapshot(doc(db, 'rooms', roomId), (snap)=>{
    if(!snap.exists()){
      setSyncStatus('online', '🟢 已連線（空白旅程）');
      return;
    }
    const remote = snap.data().state;
    if(!remote) return;
    /* 避免自己推送後又收到自己的資料觸發迴圈 */
    isSyncPaused = true;
    state = Object.assign({ tripName:'', tripStart:'', tripEnd:'', members:[], days:[], expenses:[], repayments:[], wishlist:[] }, remote);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
    setSyncStatus('online', `🟢 已同步`);
    setTimeout(()=>{ isSyncPaused = false; }, 1200);
  }, (err)=>{
    console.error('sync error', err);
    setSyncStatus('offline', '🔴 同步失敗，請重新加入');
  });
}

/* 離開房間 */
function leaveRoom(){
  if(syncUnsub){ syncUnsub(); syncUnsub = null; }
  syncRoomId = null;
  localStorage.removeItem('trip-ledger-room');
  setSyncStatus('offline', '⚪ 未連線');
  document.getElementById('roomCodeDisplay').classList.add('hidden');
  document.getElementById('leaveRoomBtn').classList.add('hidden');
  document.getElementById('createRoomBtn').classList.remove('hidden');
  document.getElementById('joinRoomBtn').classList.remove('hidden');
  document.getElementById('joinRoomInput').closest('.sync-join-row').classList.remove('hidden');
}

/* 加入房間（建立 or 加入既有） */
async function joinRoom(roomId, isNew = false){
  if(!fbReady){ alert('網路尚未就緒，請稍後再試'); return; }
  roomId = roomId.toUpperCase().trim();
  if(roomId.length !== 6){ alert('邀請碼需為 6 碼'); return; }
  syncRoomId = roomId;
  localStorage.setItem('trip-ledger-room', roomId);

  /* 隱藏建立/加入按鈕，顯示房間碼和離開按鈕 */
  document.getElementById('createRoomBtn').classList.add('hidden');
  document.getElementById('joinRoomBtn').closest ? null : null;
  document.getElementById('joinRoomInput').closest('.sync-join-row').classList.add('hidden');
  document.getElementById('roomCodeText').textContent = roomId;
  document.getElementById('roomCodeDisplay').classList.remove('hidden');
  document.getElementById('leaveRoomBtn').classList.remove('hidden');

  /* 若是新建立的房間，先把目前資料推上去 */
  if(isNew) await (async ()=>{
    try{
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      await setDoc(doc(db, 'rooms', roomId), {
        state: JSON.parse(JSON.stringify(state)),
        updatedAt: serverTimestamp()
      });
    }catch(e){ console.error(e); }
  })();

  syncSubscribe(roomId);
}

/* 覆寫 saveState：本地 + Firestore 同時寫 */
const _origSaveState = saveState;
saveState = function(){
  _origSaveState();
  if(syncRoomId && !isSyncPaused) syncPush();
};

/* UI 事件 */
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('createRoomBtn').addEventListener('click', async ()=>{
    const code = genRoomCode();
    await joinRoom(code, true);
  });

  document.getElementById('joinRoomBtn').addEventListener('click', async ()=>{
    const code = document.getElementById('joinRoomInput').value.trim();
    if(!code){ alert('請輸入邀請碼'); return; }
    await joinRoom(code, false);
  });

  document.getElementById('joinRoomInput').addEventListener('keydown', async (e)=>{
    if(e.key === 'Enter'){
      const code = e.target.value.trim();
      if(code) await joinRoom(code, false);
    }
  });

  document.getElementById('leaveRoomBtn').addEventListener('click', ()=>{
    if(confirm('確定要離開這個同步房間？（資料仍保留在本機）')) leaveRoom();
  });

  document.getElementById('copyRoomBtn').addEventListener('click', ()=>{
    const code = document.getElementById('roomCodeText').textContent;
    navigator.clipboard.writeText(code).then(()=>{
      const btn = document.getElementById('copyRoomBtn');
      btn.textContent = '已複製！';
      setTimeout(()=>{ btn.textContent = '複製'; }, 1500);
    });
  });

  /* 若之前有加入過房間，自動重新連線 */
  const savedRoom = localStorage.getItem('trip-ledger-room');
  if(savedRoom){
    /* 等 Firebase 載入 */
    const tryReconnect = ()=>{
      if(fbReady){ joinRoom(savedRoom, false); }
      else { setTimeout(tryReconnect, 300); }
    };
    tryReconnect();
  }
});

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>{

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installBtn');
  if(btn) btn.classList.remove('hidden');
});
document.addEventListener('DOMContentLoaded', ()=>{
  const btn = document.getElementById('installBtn');
  if(btn){

      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      btn.classList.add('hidden');
    });
  }
});
